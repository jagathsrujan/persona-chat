name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build app
        run: scripts/build_macos_app.sh
      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Persona-Chat-macos-arm64
          path: dist/Persona-Chat-macos-arm64.zip
